<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 130 | HTML Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css"></head>
<body>
<header>
        <h1>WDD 130 | Herzon Trujillo | HTML and CSS Quiz</h1>
</header>
<main>
    <form>
        <fieldset>
            <div class="form-item">
                <div class="form-item column2">
                    <label for="q1">1. What does the acronym CSS stand for?</label>
                    <input type="text" id="q1" name="q1">
                </div>
                <div class="form-item column2">
                    <label for="q2">2. How are id and class attributes selected in CSS?</label>
                    <textarea id="q2" name="q2" rows="4" cols="50"></textarea>
                </div>  
            </div>           
            <label for="q3">3. Which of the following is a valid CSS comment?</label>
                <select id="q3" name="q3">
                    <option value="" selected disabled>Choose One...</option>
                    <option value="not-comment">*/This is a comment/*</option>
                    <option value="comment">/*This is a comment*/</option>
                    <option value="wrong">/#This is a comment#/</option>
                    <option value="neither">Neither</option>
                </select>
                <div class="column1">
                    <label for="q4">4. What is the bottom margin given this declaration?</label>
                    <p class="margin-box">margin: 10px 5px 15px;</p>
                    <input type="number" id="q4" name="q4" min="0" max="100">
                </div>
        </fieldset>
    <button type="submit">Submit Quiz</button>
    </form>
</main>
<footer>
    <p>&copy; 2024 | HTML HTML and CSS Quiz | Herzon Trujillo</p>
</footer>
</body>
</html>
